name: Validate

on:
  pull_request:
    paths:
      - "**/*.zig"
      - "**/*.cpp"
      - "**/*.h"
      - "**/*.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "**/CMakeLists.txt"
      - "**/aplugin.json"
      - "build.zig"
      - "build.zig.zon"
      - ".github/workflows/validate.yml"
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build wasm
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      # Rust 插件（highlight 等）：cargo→wasm32-wasip1；C 依赖经 zig cc 编（用上面的 zig）。
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Install emscripten
        run: brew install emscripten

      - name: Build
        run: zig build
        # Publishing is owned by publish.yml (triggered by a `<plugin>-v<ver>`
        # tag). This workflow only proves the tree builds.
